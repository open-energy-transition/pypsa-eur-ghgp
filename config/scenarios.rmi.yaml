  snapshots:
    start: "2020-01-01"
    end: "2021-01-01"
    inclusive: left

  electricity:
    powerplants_filter: "(DateOut > 2020 or DateOut != DateOut) and (DateIn < 2021 or DateIn != DateIn)"

  load:
    fixed_year: 2020

  costs:
    year: 2020

  # No grouping_years_power override needed: 2020 is already a bin boundary in the default list.
  # No biomass override needed: 2020 anchor years are in config.default.yaml.

  # build_central_heating_temperature_profiles raises ValueError if planning_horizons[0] < energy_totals_year.
  # Data constraint: only jrc_idees/archive/2023-v1 is downloaded → max usable year is 2023.
  # Rule: use min(Y, 2023). For Y=2020 the ValueError constraint forces Y (2020 < 2023 default).
  energy:
    energy_totals_year: 2020

  backcasting:
    year_costs: 2025

