#### BASELINE SCENARIOS ####

baseline-2025-3H:
  scenario:
    planning_horizons:
    - 2025

  atlite:
    default_cutout: "europe-2025-sarah3-era5"

  snapshots:
    start: "2025-01-01"
    end: "2026-01-01"
    inclusive: left

  electricity:
    powerplants_filter: "(DateOut > 2025 or DateOut != DateOut) and (DateIn < 2026 or DateIn != DateIn)"

  load:
    fixed_year: 2025

  costs:
    year: 2025

baseline-2024-3H:
  scenario:
    planning_horizons:
    - 2024

  atlite:
    default_cutout: "europe-2024-sarah3-era5"

  snapshots:
    start: "2024-01-01"
    end: "2025-01-01"
    inclusive: left

  electricity:
    powerplants_filter: "(DateOut > 2024 or DateOut != DateOut) and (DateIn < 2025 or DateIn != DateIn)"

  load:
    fixed_year: 2024

  existing_capacities:
    grouping_years_power:
    - 1900
    - 1950
    - 1955
    - 1960
    - 1965
    - 1970
    - 1975
    - 1980
    - 1985
    - 1990
    - 1995
    - 2000
    - 2005
    - 2010
    - 2015
    - 2020
    - 2024
    - 2025
    - 2030

  costs:
    year: 2024

  # build_biomass_potentials uses dict.get(year) with no interpolation — must add
  # any backcasting year missing from config.default.yaml's anchor years.
  # Required even with sector.biomass: false because biomass_potentials is an
  # unconditional input of prepare_sector_network (build_sector.smk:1649).
  biomass:
    share_unsustainable_use_retained:
      2024: 1.0
    share_sustainable_potential_available:
      2024: 0

  # build_central_heating_temperature_profiles raises ValueError if planning_horizons[0] < energy_totals_year.
  # Data constraint: only jrc_idees/archive/2023-v1 is downloaded → max usable year is 2023.
  # Rule: use min(Y, 2023). For Y=2024 the ValueError constraint is satisfied (2024 >= 2023 default),
  # but we cap at 2023 because no 2024 JRC IDEES data is available.
  energy:
    energy_totals_year: 2023

  backcasting:
    year_costs: 2025

